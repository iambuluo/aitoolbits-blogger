name: Daily GitHub Trending Article

on:
  schedule:
    # Daily at UTC 2:00 = Beijing 10:00 AM
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of trending articles to publish'
        required: false
        default: '1'
      refresh:
        description: 'Force refresh trending data cache'
        required: false
        type: boolean
        default: false

jobs:
  publish-trending:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet urllib3

      - name: Random delay for natural timing
        if: github.event_name == 'schedule'
        run: |
          MAX_DELAY=$((1 * 3600))  # 1 hour max
          DELAY=$((RANDOM * RANDOM % $MAX_DELAY))
          echo "Random delay: $DELAY seconds (~$((DELAY / 60)) minutes)"
          sleep $DELAY
          echo "Delay complete, starting at $(date -u)"

      - name: Verify secrets
        run: |
          echo "=== Secrets Status ==="
          MISSING=""
          for SECRET in BLOGGER_CLIENT_ID BLOGGER_CLIENT_SECRET BLOGGER_REFRESH_TOKEN BLOGGER_BLOG_ID DEEPSEEK_API_KEY; do
            if [ -n "${!SECRET}" ]; then
              echo "  $SECRET: OK"
            else
              echo "  $SECRET: MISSING"
              MISSING="$MISSING $SECRET"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo ""
            echo "ERROR: Required secrets not configured:$MISSING"
            exit 1
          fi
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Publish trending article
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AD_PROVIDER: ${{ secrets.AD_PROVIDER || 'none' }}
          AD_ZONE_ID: ${{ secrets.AD_ZONE_ID || '229646' }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT || '' }}
        run: |
          cd scripts

          COUNT="${{ github.event.inputs.count || '1' }}"
          REFRESH_FLAG=""
          if [ "${{ github.event.inputs.refresh }}" = "true" ]; then
            REFRESH_FLAG="--refresh"
          fi

          echo "=== DAILY TRENDING MODE ==="
          echo "Articles to publish: $COUNT"
          echo "Force refresh: ${REFRESH_FLAG:-no}"
          echo ""

          python publish_trending.py $COUNT $REFRESH_FLAG

      - name: Log result
        if: always()
        run: |
          echo "Trending workflow completed at $(date -u)"
          echo "Trigger: ${{ github.event_name }}"
