name: Auto Publish Blog Articles

on:
  schedule:
    # 3 times daily at randomized times via minute offsets
    # UTC 0:17 = Beijing 8:17AM  (morning article)
    # UTC 6:42 = Beijing 2:42PM  (afternoon article)
    # UTC 13:08 = Beijing 9:08PM (evening article)
    - cron: '17 0 * * *'
    - cron: '42 6 * * *'
    - cron: '08 13 * * *'
  workflow_dispatch:
    inputs:
      article_count:
        description: 'Number of articles to generate and publish'
        required: false
        default: '1'
      is_draft:
        description: 'Save as draft instead of publishing'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet urllib3

      - name: Random delay for natural timing
        if: github.event_name == 'schedule'
        run: |
          MAX_DELAY=$((2 * 3600))  # 2 hours max
          DELAY=$((RANDOM * RANDOM % $MAX_DELAY))
          echo "Random delay: $DELAY seconds (~$((DELAY / 60)) minutes)"
          sleep $DELAY
          echo "Delay complete, starting publish at $(date -u)"

      - name: Verify secrets
        run: |
          echo "=== Secrets Status ==="
          MISSING=""
          for SECRET in BLOGGER_CLIENT_ID BLOGGER_CLIENT_SECRET BLOGGER_REFRESH_TOKEN BLOGGER_BLOG_ID DEEPSEEK_API_KEY PEXELS_API_KEY; do
            if [ -n "${!SECRET}" ]; then
              echo "  $SECRET: OK"
            else
              echo "  $SECRET: MISSING"
              MISSING="$MISSING $SECRET"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo ""
            echo "ERROR: Required secrets not configured:$MISSING"
            echo "Run locally: python scripts/setup_github_secrets.py"
            exit 1
          fi
          echo ""
          echo "Has images: $([ -n "$PEXELS_API_KEY" ] && echo 'YES' || echo 'NO (text-only)')"
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Generate and publish articles
        env:
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AD_PROVIDER: ${{ secrets.AD_PROVIDER || 'monetag' }}
          AD_ZONE_ID: ${{ secrets.AD_ZONE_ID || '229646' }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cd scripts
          COUNT=${{ github.event.inputs.article_count || '1' }}
          DRAFT_FLAG=""
          if [ "${{ github.event.inputs.is_draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi

          echo "Article count: $COUNT"
          echo "Draft mode: ${DRAFT_FLAG:-false}"
          echo "Ad provider: $AD_PROVIDER"
          echo "Has images: $([ -n "$PEXELS_API_KEY" ] && echo 'YES' || echo 'NO')"

          # Run the publish pipeline
          python publish_to_blogger.py $COUNT $DRAFT_FLAG

      - name: Log result
        if: always()
        run: |
          echo "Workflow completed at $(date -u)"
          echo "Trigger: ${{ github.event_name }}"
